<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether OS // Core Kernel [Part 1]</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        /* 
         * ============================================================================
         * AETHER OS // GLOBAL STYLESHEET & CSS VARIABLES
         * ============================================================================
         */
        :root {
            /* Core Palettes */
            --aether-bg: #030305;
            --aether-surface: rgba(15, 15, 20, 0.6);
            --aether-glass: rgba(255, 255, 255, 0.03);
            --aether-glass-hover: rgba(255, 255, 255, 0.08);
            --aether-border: rgba(255, 255, 255, 0.05);
            --aether-border-highlight: rgba(6, 182, 212, 0.3);
            
            /* Accent Colors */
            --accent-cyan: #06b6d4;
            --accent-purple: #a855f7;
            --accent-emerald: #10b981;
            --accent-rose: #f43f5e;
            --accent-amber: #f59e0b;
            
            /* Typography */
            --font-mono: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            --font-sans: system-ui, -apple-system, sans-serif;
            
            /* UI Metrics */
            --taskbar-height: 48px;
            --window-border-radius: 12px;
            --glass-blur: blur(20px);
        }

        /* Base Reset & Typography */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--aether-bg);
            color: #e2e8f0;
            font-family: var(--font-sans);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================================================
         * ANIMATIONS & KEYFRAMES
         * ============================================================================ */
        @keyframes bootSequence {
            0% { opacity: 0; filter: brightness(0) contrast(1.5); }
            50% { opacity: 0.5; filter: brightness(1.2) contrast(1.2); }
            100% { opacity: 1; filter: brightness(1) contrast(1); }
        }

        @keyframes windowOpen {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ============================================================================
         * COMPONENT CLASSES
         * ============================================================================ */
        
        /* The WebGL Background Container */
        #os-matrix-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Global Scanline Overlay */
        .os-scanline {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.25) 51%);
            background-size: 100% 4px;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.15;
        }

        .os-booting { animation: bootSequence 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Window Manager Styles */
        .os-window {
            position: absolute;
            background: var(--aether-surface);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--aether-border);
            border-radius: var(--window-border-radius);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: windowOpen 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            min-width: 350px;
            min-height: 250px;
            z-index: 10;
        }

        .os-window.active {
            border-color: var(--aether-border-highlight);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.1), 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            z-index: 100;
        }

        .os-window-header {
            height: 40px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--aether-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            cursor: grab;
            flex-shrink: 0;
        }

        .os-window-header:active { cursor: grabbing; }

        .os-window-controls { display: flex; gap: 8px; }
        .control-dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: opacity 0.2s; }
        .control-dot:hover { opacity: 0.8; }
        .dot-close { background-color: #ef4444; }
        .dot-min { background-color: #eab308; }
        .dot-max { background-color: #22c55e; }

        .os-window-title {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            pointer-events: none;
        }

        .os-window-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            position: relative;
        }

        /* Taskbar Styles */
        .os-taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--taskbar-height);
            background: rgba(5, 5, 10, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--aether-border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 1000;
        }

        .taskbar-start {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            transition: all 0.2s;
        }

        .taskbar-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.6);
        }

        .taskbar-items {
            display: flex;
            gap: 8px;
            margin-left: 24px;
            flex: 1;
        }

        .taskbar-item {
            padding: 6px 12px;
            border-radius: 6px;
            background: var(--aether-glass);
            border: 1px solid transparent;
            font-size: 0.8rem;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .taskbar-item:hover { background: var(--aether-glass-hover); border-color: var(--aether-border); }
        .taskbar-item.active { background: rgba(6, 182, 212, 0.1); border-color: rgba(6, 182, 212, 0.3); color: var(--accent-cyan); }

        .taskbar-tray {
            display: flex;
            align-items: center;
            gap: 16px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body class="os-booting">

    <!-- WebGL Background Mount -->
    <div id="os-matrix-bg"></div>
    <div class="os-scanline"></div>

    <!-- Window Manager Mount Point -->
    <div id="os-desktop" class="absolute inset-0 bottom-[48px] overflow-hidden">
        <!-- Windows are dynamically injected here by the JS Kernel -->
    </div>

    <!-- Taskbar -->
    <div class="os-taskbar">
        <div class="taskbar-start" id="start-menu-btn">
            <span class="text-white font-bold text-xs">A</span>
        </div>
        
        <div class="taskbar-items" id="taskbar-item-container">
            <!-- App icons injected here -->
        </div>

        <div class="taskbar-tray">
            <span id="tray-network" class="text-green-400">NET: OK</span>
            <span id="tray-memory">MEM: --</span>
            <span id="tray-clock">00:00:00</span>
        </div>
    </div>

    <!-- 
      =========================================================================
      AETHER KERNEL (JAVASCRIPT)
      =========================================================================
    -->
    <script>
        /**
         * AETHER OS // KERNEL & THREAD MANAGER
         * Architecture: Single-file distributed multi-threading using Blob URIs.
         */
        
        const AetherOS = {
            version: '3.0.LIMITLESS',
            windows: new Map(),
            activeWindowId: null,
            zIndexCounter: 100,
            
            // Core Initialization
            boot() {
                this.initClock();
                this.initTelemetry();
                this.spawnBackgroundWorkers();
                this.initWebGLMatrix();
                
                // Spawn Initial System Diagnostics Window
                this.createWindow('sys-diag', 'System Diagnostics', this.templates.diagnostics(), 600, 400);
                
                console.log(`[AETHER KERNEL] Boot sequence complete. v${this.version}`);
            },

            // ==========================================
            // BLOB INJECTORS (Workers & Service Workers)
            // ==========================================
            spawnBackgroundWorkers() {
                // 1. Service Worker for PWA Offline Caching (Created on the fly)
                const swCode = `
                    const CACHE_NAME = 'aether-os-v1';
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
                    self.addEventListener('fetch', e => {
                        // Advanced dynamic caching logic allows the single file to survive offline
                        e.respondWith(fetch(e.request).catch(() => new Response('Offline Kernel Active.')));
                    });
                `;
                const swBlob = new Blob([swCode], { type: 'text/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register(swUrl).then(() => console.log('[KERNEL] Blob Service Worker registered.'));
                }

                // 2. Cryptographic Web Worker (Offloads heavy CPU tasks from UI thread)
                const cryptoWorkerCode = `
                    self.onmessage = async function(e) {
                        const { action, payload, id } = e.data;
                        if(action === 'SHA-256') {
                            const buffer = new TextEncoder().encode(payload);
                            const hash = await crypto.subtle.digest('SHA-256', buffer);
                            const hex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
                            self.postMessage({ id, result: hex });
                        }
                    };
                `;
                const cwBlob = new Blob([cryptoWorkerCode], { type: 'text/javascript' });
                this.cryptoWorker = new Worker(URL.createObjectURL(cwBlob));
                this.cryptoWorker.onmessage = (e) => {
                    console.log(`[WORKER RESP] Task ${e.data.id} completed:`, e.data.result);
                };
            },

            // ==========================================
            // WINDOW MANAGEMENT SYSTEM
            // ==========================================
            createWindow(id, title, htmlContent, width = 400, height = 300) {
                if (this.windows.has(id)) {
                    this.focusWindow(id);
                    return;
                }

                const desktop = document.getElementById('os-desktop');
                const winEl = document.createElement('div');
                winEl.className = 'os-window';
                winEl.id = `window-${id}`;
                winEl.style.width = `${width}px`;
                winEl.style.height = `${height}px`;
                
                // Center window with slight offset
                const startX = Math.max(10, (window.innerWidth - width) / 2 + (Math.random() * 40 - 20));
                const startY = Math.max(10, (window.innerHeight - height - 48) / 2 + (Math.random() * 40 - 20));
                winEl.style.left = `${startX}px`;
                winEl.style.top = `${startY}px`;

                winEl.innerHTML = `
                    <div class="os-window-header" id="header-${id}">
                        <div class="os-window-controls">
                            <div class="control-dot dot-close" onclick="AetherOS.closeWindow('${id}')"></div>
                            <div class="control-dot dot-min" onclick="AetherOS.minimizeWindow('${id}')"></div>
                            <div class="control-dot dot-max" onclick="AetherOS.maximizeWindow('${id}')"></div>
                        </div>
                        <div class="os-window-title">${title}</div>
                        <div class="w-4"></div> <!-- Balancer -->
                    </div>
                    <div class="os-window-content">
                        ${htmlContent}
                    </div>
                `;

                desktop.appendChild(winEl);
                this.windows.set(id, { el: winEl, title, state: 'normal' });
                
                this.makeDraggable(winEl, document.getElementById(`header-${id}`));
                this.addToTaskbar(id, title);
                
                winEl.addEventListener('mousedown', () => this.focusWindow(id));
                this.focusWindow(id);
            },

            closeWindow(id) {
                const win = this.windows.get(id);
                if (!win) return;
                win.el.remove();
                this.windows.delete(id);
                document.getElementById(`taskbar-${id}`).remove();
            },

            focusWindow(id) {
                const win = this.windows.get(id);
                if (!win) return;
                this.zIndexCounter++;
                win.el.style.zIndex = this.zIndexCounter;
                
                document.querySelectorAll('.os-window').forEach(w => w.classList.remove('active'));
                document.querySelectorAll('.taskbar-item').forEach(t => t.classList.remove('active'));
                
                win.el.classList.add('active');
                document.getElementById(`taskbar-${id}`).classList.add('active');
                this.activeWindowId = id;
            },

            addToTaskbar(id, title) {
                const container = document.getElementById('taskbar-item-container');
                const item = document.createElement('div');
                item.className = 'taskbar-item';
                item.id = `taskbar-${id}`;
                item.innerHTML = `<span class="w-2 h-2 rounded-full bg-cyan-400"></span> ${title}`;
                item.onclick = () => this.focusWindow(id);
                container.appendChild(item);
            },

            makeDraggable(element, handle) {
                let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
                handle.onmousedown = dragMouseDown;

                function dragMouseDown(e) {
                    e.preventDefault();
                    pos3 = e.clientX; pos4 = e.clientY;
                    document.onmouseup = closeDragElement;
                    document.onmousemove = elementDrag;
                }

                function elementDrag(e) {
                    e.preventDefault();
                    pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                    pos3 = e.clientX; pos4 = e.clientY;
                    element.style.top = (element.offsetTop - pos2) + "px";
                    element.style.left = (element.offsetLeft - pos1) + "px";
                }

                function closeDragElement() {
                    document.onmouseup = null;
                    document.onmousemove = null;
                }
            },

            // ==========================================
            // SYSTEM TELEMETRY & BACKGROUND LOGIC
            // ==========================================
            initClock() {
                setInterval(() => {
                    const now = new Date();
                    document.getElementById('tray-clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
                }, 1000);
            },

            initTelemetry() {
                setInterval(() => {
                    if(navigator.deviceMemory) {
                        document.getElementById('tray-memory').innerText = `MEM: ${navigator.deviceMemory}GB+`;
                    } else {
                        document.getElementById('tray-memory').innerText = `CORES: ${navigator.hardwareConcurrency || '--'}`;
                    }
                    
                    const net = document.getElementById('tray-network');
                    if(navigator.onLine) {
                        net.innerText = 'NET: OK';
                        net.className = 'text-green-400';
                    } else {
                        net.innerText = 'NET: ERR';
                        net.className = 'text-red-500 animate-pulse';
                    }
                }, 5000);
            },

            // ==========================================
            // WEBGL BACKGROUND KERNEL (THREE.JS)
            // ==========================================
            initWebGLMatrix() {
                const container = document.getElementById('os-matrix-bg');
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: 'high-performance' });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                // Create a massive data-grid wireframe
                const gridGeo = new THREE.PlaneGeometry(200, 200, 40, 40);
                const gridMat = new THREE.MeshBasicMaterial({ 
                    color: 0x06b6d4, 
                    wireframe: true, 
                    transparent: true, 
                    opacity: 0.08 
                });
                const grid = new THREE.Mesh(gridGeo, gridMat);
                grid.rotation.x = -Math.PI / 2;
                grid.position.y = -10;
                scene.add(grid);

                camera.position.z = 20;
                camera.position.y = 5;

                let time = 0;
                function animate() {
                    requestAnimationFrame(animate);
                    time += 0.005;
                    
                    // Wavy terrain effect simulating data flow
                    const positions = grid.geometry.attributes.position;
                    for (let i = 0; i < positions.count; i++) {
                        const x = positions.getX(i);
                        const y = positions.getY(i);
                        positions.setZ(i, Math.sin(x * 0.1 + time) * 2 + Math.cos(y * 0.1 + time) * 2);
                    }
                    positions.needsUpdate = true;
                    
                    renderer.render(scene, camera);
                }
                animate();

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
            },

            // ==========================================
            // HTML TEMPLATES FOR WINDOWS
            // ==========================================
            templates: {
                diagnostics: () => `
                    <div class="font-mono text-sm space-y-4">
                        <div class="border-b border-white/10 pb-2 mb-4 text-cyan-400 font-bold">AETHER KERNEL V3 DIAGNOSTICS</div>
                        <div class="flex justify-between"><span class="text-white/50">User Agent:</span> <span class="truncate ml-4 text-green-300">${navigator.userAgent.substring(0, 30)}...</span></div>
                        <div class="flex justify-between"><span class="text-white/50">Logical Cores:</span> <span class="text-green-300">${navigator.hardwareConcurrency || 'Unknown'}</span></div>
                        <div class="flex justify-between"><span class="text-white/50">Memory Bound:</span> <span class="text-green-300">${navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Restricted'}</span></div>
                        <div class="flex justify-between"><span class="text-white/50">Web Worker:</span> <span class="text-green-300 animate-pulse">Online & Attached</span></div>
                        <div class="flex justify-between"><span class="text-white/50">Service Worker:</span> <span class="text-green-300">Blob Generated</span></div>
                        
                        <div class="mt-8 p-4 bg-black/50 border border-white/10 rounded-lg text-white/70 text-xs leading-relaxed">
                            Base OS architecture loaded. The Floating Window Manager and WebGL matrix are operational. The single file has successfully spawned background threads.
                        </div>
                    </div>
                `
            }
        };

        // Initialize OS on load
        window.onload = () => AetherOS.boot();
    </script>
</body>
</html>
