<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AETHER // Neural Interface</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --bg:#030712;
  --glass:rgba(15,23,42,.55);
  --border:rgba(255,255,255,.08);
  --text:#e5e7eb;
  --muted:#94a3b8;
}
*{
  box-sizing:border-box;
}
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle at top,#111827,#020617 70%);
  color:var(--text);
  font-family:Inter,system-ui,sans-serif;
}
#bg{
  position:fixed;
  inset:0;
  z-index:-2;
}
.overlay{
  position:fixed;
  inset:0;
  background:
  linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:40px 40px;
  z-index:-1;
}
.glass{
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--border);
  box-shadow:
  0 10px 40px rgba(0,0,0,.45),
  inset 0 1px 0 rgba(255,255,255,.05);
}
.tab{
  transition:.25s ease;
}
.tab:hover{
  transform:translateY(-1px);
}
.tab.active{
  background:rgba(99,102,241,.18);
  border-color:rgba(129,140,248,.5);
  color:white;
}
.tool{
  display:none;
  animation:fade .25s ease;
}
.tool.active{
  display:flex;
}
@keyframes fade{
  from{
    opacity:0;
    transform:translateY(6px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
.scrollbar::-webkit-scrollbar{
  width:6px;
}
.scrollbar::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.15);
  border-radius:999px;
}
.input{
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.08);
  color:white;
  outline:none;
  transition:.2s ease;
}
.input:focus{
  border-color:rgba(99,102,241,.6);
  box-shadow:0 0 0 4px rgba(99,102,241,.15);
}
.glow{
  box-shadow:0 0 20px rgba(139,92,246,.25);
}
</style>
</head>
<body class="h-screen p-4 flex flex-col gap-4">
<div id="bg"></div>
<div class="overlay"></div>
<header class="glass rounded-3xl p-4 flex items-center justify-between">
  <div>
    <h1 class="text-xl font-black tracking-widest">
      AETHER
    </h1>
    <p class="text-xs text-slate-400">
      Neural Terminal Interface
    </p>
  </div>
  <div class="flex gap-2">
    <button data-tool="chat"
      class="tab active px-4 py-2 rounded-2xl border border-indigo-500/20 text-indigo-300 text-sm font-semibold">
      🤖 AI
    </button>
    <button data-tool="image"
      class="tab px-4 py-2 rounded-2xl border border-fuchsia-500/20 text-fuchsia-300 text-sm font-semibold">
      🖼 Dream
    </button>
    <button data-tool="vault"
      class="tab px-4 py-2 rounded-2xl border border-cyan-500/20 text-cyan-300 text-sm font-semibold">
      💾 Vault
    </button>
  </div>
</header>
<main class="glass rounded-3xl flex-1 p-5 overflow-hidden">
  <!-- CHAT -->
  <section id="chat" class="tool active flex-col h-full">
    <div class="flex items-center justify-between mb-4">
      <div>
        <h2 class="text-indigo-300 font-bold">
          AI Logic Core
        </h2>
        <p class="text-xs text-slate-400">
          Conversational neural stream
        </p>
      </div>
      <div class="text-[10px] px-2 py-1 rounded-full bg-emerald-500/10 text-emerald-300 border border-emerald-500/20">
        ONLINE
      </div>
    </div>
    <div id="chatOutput"
      class="flex-1 overflow-y-auto scrollbar rounded-2xl bg-black/25 border border-white/5 p-4 font-mono text-sm space-y-3">
      <div class="text-slate-500">
        System initialized...
      </div>
    </div>
    <div class="mt-4 flex gap-3">
      <input
        id="chatInput"
        class="input flex-1 rounded-2xl px-4 py-3"
        placeholder="Transmit command..."
      />
      <button
        id="sendBtn"
        class="glow bg-indigo-600 hover:bg-indigo-500 transition px-5 rounded-2xl font-semibold">
        Send
      </button>
    </div>
  </section>
  <!-- IMAGE -->
  <section id="image" class="tool flex-col h-full">
    <div class="mb-4">
      <h2 class="text-fuchsia-300 font-bold">
        Dream Weaver
      </h2>
      <p class="text-xs text-slate-400">
        AI image synthesis interface
      </p>
    </div>
    <input
      id="imagePrompt"
      class="input rounded-2xl px-4 py-3"
      placeholder="Describe a scene..."
    />
    <button
      id="imgBtn"
      class="mt-3 glow bg-fuchsia-600 hover:bg-fuchsia-500 transition py-3 rounded-2xl font-semibold">
      Generate Image
    </button>
    <div class="flex-1 flex items-center justify-center mt-6 overflow-hidden">
      <img
        id="imageOutput"
        class="max-h-full rounded-3xl border border-white/10 hidden"
      />
    </div>
  </section>
  <!-- VAULT -->
  <section id="vault" class="tool flex-col h-full">
    <div class="mb-4">
      <h2 class="text-cyan-300 font-bold">
        Data Vault
      </h2>
      <p class="text-xs text-slate-400">
        Persistent encrypted local notes
      </p>
    </div>
    <textarea
      id="vaultInput"
      class="input flex-1 rounded-3xl p-5 resize-none font-mono"
      placeholder="Store classified data..."
    ></textarea>
  </section>
</main>
<script>
const tabs = document.querySelectorAll(".tab");
const tools = document.querySelectorAll(".tool");
tabs.forEach(tab=>{
  tab.addEventListener("click",()=>{
    tabs.forEach(t=>t.classList.remove("active"));
    tools.forEach(tool=>tool.classList.remove("active"));
    tab.classList.add("active");
    document
      .getElementById(tab.dataset.tool)
      .classList.add("active");
  });
});
const chatInput = document.getElementById("chatInput");
const chatOutput = document.getElementById("chatOutput");
async function sendMessage(){
  const text = chatInput.value.trim();
  if(!text) return;
  appendMessage("USER",text);
  chatInput.value="";
  try{
    const res = await fetch(
      `https://text.pollinations.ai/${encodeURIComponent(text)}`
    );
    const data = await res.text();
    appendMessage("AETHER",data);
  }catch(err){
    appendMessage("ERROR","Connection failure.");
  }
}
function appendMessage(role,msg){
  const el = document.createElement("div");
  el.innerHTML = `
    <div class="text-xs text-slate-500 mb-1">${role}</div>
    <div class="bg-white/5 border border-white/5 rounded-2xl p-3 whitespace-pre-wrap">
      ${msg}
    </div>
  `;
  chatOutput.appendChild(el);
  chatOutput.scrollTop = chatOutput.scrollHeight;
}
document
  .getElementById("sendBtn")
  .addEventListener("click",sendMessage);
chatInput.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") sendMessage();
});
document
  .getElementById("imgBtn")
  .addEventListener("click",()=>{
    const prompt =
      document.getElementById("imagePrompt").value.trim();
    if(!prompt) return;
    const img =
      document.getElementById("imageOutput");
    img.src =
      `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
    img.classList.remove("hidden");
});
const vault =
  document.getElementById("vaultInput");
vault.value =
  localStorage.getItem("aetherVault") || "";
vault.addEventListener("input",()=>{
  localStorage.setItem("aetherVault",vault.value);
});
</script>
<script>
const scene = new THREE.Scene();
const camera =
  new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
  );
const renderer =
  new THREE.WebGLRenderer({
    alpha:true,
    antialias:true
  });
renderer.setSize(window.innerWidth,window.innerHeight);
document
  .getElementById("bg")
  .appendChild(renderer.domElement);
const geometry =
  new THREE.TorusKnotGeometry(8,1.2,180,32);
const material =
  new THREE.MeshBasicMaterial({
    color:0x8b5cf6,
    wireframe:true,
    transparent:true,
    opacity:.18
  });
const mesh =
  new THREE.Mesh(geometry,material);
scene.add(mesh);
camera.position.z = 22;
function animate(){
  requestAnimationFrame(animate);
  mesh.rotation.x += 0.002;
  mesh.rotation.y += 0.004;
  renderer.render(scene,camera);
}
animate();
window.addEventListener("resize",()=>{
  camera.aspect =
    window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );
});
</script>
</body>
</html>
