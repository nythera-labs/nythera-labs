<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nythera Labs // Cyber-Dash 3D</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #020205;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .hud-element {
            background: rgba(6, 9, 13, 0.85);
            border: 1px solid #58a6ff;
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.2);
            padding: 12px 20px;
            border-radius: 8px;
            color: #ffffff;
            backdrop-filter: blur(8px);
            pointer-events: auto;
        }
        #top-hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .stat-box {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #score-val { color: #58a6ff; text-shadow: 0 0 8px #58a6ff;}
        #hp-val { color: #ff7b72; text-shadow: 0 0 8px #ff7b72;}
        
        #controls-layer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            padding-bottom: 20px;
        }
        .touch-zone {
            pointer-events: auto;
            border-radius: 50%;
        }
        #joystick-bound {
            width: 140px;
            height: 140px;
            background: rgba(88, 166, 255, 0.05);
            border: 2px solid rgba(88, 166, 255, 0.3);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(88, 166, 255, 0.1);
        }
        #joystick-thumb {
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #58a6ff 0%, #1f6feb 100%);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 20px #58a6ff;
        }
        #action-btn {
            width: 95px;
            height: 95px;
            background: rgba(255, 123, 114, 0.15);
            border: 2px solid #ff7b72;
            color: #ffffff;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255, 123, 114, 0.4);
        }
        #action-btn:active {
            background: #ff7b72;
            box-shadow: 0 0 25px #ff7b72;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 10, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        #game-over-screen h1 {
            font-size: 3.5rem;
            color: #ff7b72;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 123, 114, 0.6);
        }
        .btn-restart {
            margin-top: 25px;
            padding: 14px 35px;
            background: #238636;
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 15px #238636;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="top-hud">
            <div class="hud-element stat-box">CORE VALUE: <span id="hp-val">100%</span></div>
            <div class="hud-element stat-box">PURGED REGISTRIES: <span id="score-val">0</span></div>
        </div>

        <div id="controls-layer">
            <div id="joystick-bound" class="touch-zone">
                <div id="joystick-thumb"></div>
            </div>
            <div id="action-btn" class="touch-zone">DASH</div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1>SYSTEM COLLAPSE</h1>
        <p>Your core framework terminated.</p>
        <p>Total Points: <span id="final-score">0</span></p>
        <button class="btn-restart" onclick="resetGame()">REBOOT INTERFACE</button>
    </div>

    <script>
        let scene, camera, renderer;
        let player, playerRing, playerCore; 
        let enemies = [];
        let particles = [];
        let mapPillars = [];
        let gameActive = true;
        let score = 0;
        let hp = 100;
        
        let moveInput = new THREE.Vector2(0, 0);
        let isDashing = false;
        let dashTimer = 0;
        let dashDuration = 0.15;
        let dashCooldown = 0;
        let dashVelocity = new THREE.Vector3();
        const baseSpeed = 0.22;
        const dashMultiplier = 3.2;
        const arenaSize = 30;

        let joystickActive = false;
        let joystickStart = new THREE.Vector2();
        const maxJoystickDist = 50;

        function init() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.03);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 16, 18);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Dynamic Atmospheric Lights
            const ambientLight = new THREE.AmbientLight(0x0a1128, 0.6);
            scene.add(ambientLight);

            const neonLight1 = new THREE.PointLight(0x58a6ff, 2, 60);
            neonLight1.position.set(-20, 5, -20);
            scene.add(neonLight1);

            const neonLight2 = new THREE.PointLight(0xff7b72, 2, 60);
            neonLight2.position.set(20, 5, 20);
            scene.add(neonLight2);

            // Sci-Fi Starfield Background
            createStarfield();

            // Tech Grid Ground Layer
            const gridHelper = new THREE.GridHelper(arenaSize * 2, arenaSize, 0x58a6ff, 0x111625);
            gridHelper.position.y = 0;
            scene.add(gridHelper);

            // Build Fantastic Map Structures
            buildCyberMap();

            // Build Complex Sci-Fi Drone Character
            buildPlayerCharacter();

            setupControls();
            window.addEventListener('resize', onWindowResize);
            
            animate();
        }

        // --- ENVIRONMENT GENERATOR (MAP) ---
        function createStarfield() {
            const starGeo = new THREE.BufferGeometry();
            const starCount = 600;
            const posArray = new Float32Array(starCount * 3);

            for(let i=0; i<starCount*3; i+=3) {
                posArray[i] = (Math.random() - 0.5) * 150;
                posArray[i+1] = Math.random() * 50 + 10;
                posArray[i+2] = (Math.random() - 0.5) * 150;
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starMat = new THREE.PointsMaterial({ size: 0.15, color: 0xffffff, transparent: true, opacity: 0.8 });
            const starField = new THREE.Points(starGeo, starMat);
            scene.add(starField);
        }

        function buildCyberMap() {
            // Neon Boundary Fences
            const fenceGeo = new THREE.BoxGeometry(arenaSize * 2, 0.4, 0.4);
            const fenceMat = new THREE.MeshStandardMaterial({ color: 0x58a6ff, emissive: 0x1f6feb, roughness: 0.1 });
            
            const n = new THREE.Mesh(fenceGeo, fenceMat); n.position.set(0, 0.2, -arenaSize); scene.add(n);
            const s = new THREE.Mesh(fenceGeo, fenceMat); s.position.set(0, 0.2, arenaSize); scene.add(s);
            const e = new THREE.Mesh(fenceGeo, fenceMat); e.rotation.y = Math.PI/2; e.position.set(arenaSize, 0.2, 0); scene.add(e);
            const w = new THREE.Mesh(fenceGeo, fenceMat); w.rotation.y = Math.PI/2; w.position.set(-arenaSize, 0.2, 0); scene.add(w);

            // Giant Neon Corner Obelisks/Pillars
            const pillarPositions = [
                [-arenaSize, -arenaSize], [arenaSize, -arenaSize],
                [-arenaSize, arenaSize], [arenaSize, arenaSize],
                [0, -arenaSize], [0, arenaSize], [-arenaSize, 0], [arenaSize, 0]
            ];

            pillarPositions.forEach(([px, pz]) => {
                const pillarGroup = new THREE.Group();
                pillarGroup.position.set(px, 0, pz);

                // Structural Pillar Base
                const baseGeo = new THREE.CylinderGeometry(1.2, 1.8, 8, 4);
                const baseMat = new THREE.MeshStandardMaterial({ color: 0x161b22, roughness: 0.5, metalness: 0.8 });
                const base = new THREE.Mesh(baseGeo, baseMat);
                base.position.y = 4;
                pillarGroup.add(base);

                // Emissive Neon Power Core inside pillar
                const coreGeo = new THREE.CylinderGeometry(0.3, 0.3, 7.8, 8);
                const coreMat = new THREE.MeshStandardMaterial({ color: 0x58a6ff, emissive: 0x58a6ff, roughness: 0.1 });
                const core = new THREE.Mesh(coreGeo, coreMat);
                core.position.y = 4.1;
                pillarGroup.add(core);

                scene.add(pillarGroup);
                mapPillars.push(core); // Keep track to animate pulse
            });
        }

        // --- CHARACTER ARCHITECTURE (PLAYER) ---
        function buildPlayerCharacter() {
            player = new THREE.Group();
            player.position.set(0, 1.2, 0);

            // 1. Central Glowing Core Sphere
            const coreGeo = new THREE.SphereGeometry(0.4, 16, 16);
            const coreMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x58a6ff, roughness: 0.1 });
            playerCore = new THREE.Mesh(coreGeo, coreMat);
            player.add(playerCore);

            // 2. Translucent Tech Hull Shell
            const hullGeo = new THREE.OctahedronGeometry(0.7, 1);
            const hullMat = new THREE.MeshStandardMaterial({ color: 0x0d1117, roughness: 0.2, metalness: 0.9, transparent: true, opacity: 0.6 });
            const hull = new THREE.Mesh(hullGeo, hullMat);
            player.add(hull);

            // 3. Floating Orbital Gyro-Ring
            const ringGeo = new THREE.TorusGeometry(0.9, 0.08, 8, 24);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x58a6ff, emissive: 0x1f6feb, roughness: 0.2, metalness: 0.9 });
            playerRing = new THREE.Mesh(ringGeo, ringMat);
            playerRing.rotation.x = Math.PI / 3;
            player.add(playerRing);

            // 4. Thruster Engine Engine Block
            const engineGeo = new THREE.CylinderGeometry(0.2, 0.3, 0.5, 8);
            engineGeo.rotateX(Math.PI / 2);
            const engineMat = new THREE.MeshStandardMaterial({ color: 0x21262d, metalness: 0.9 });
            const engine = new THREE.Mesh(engineGeo, engineMat);
            engine.position.z = 0.6;
            player.add(engine);

            scene.add(player);
        }

        // --- CONTROLS LOOP ---
        function setupControls() {
            const bound = document.getElementById('joystick-bound');
            const thumb = document.getElementById('joystick-thumb');
            const actionBtn = document.getElementById('action-btn');

            bound.addEventListener('touchstart', (e) => {
                joystickActive = true;
                const rect = bound.getBoundingClientRect();
                joystickStart.set(rect.left + rect.width/2, rect.top + rect.height/2);
            }, {passive: true});

            window.addEventListener('touchmove', (e) => {
                if (!joystickActive) return;
                const touch = findTouchById(e.touches, e.targetTouches[0].identifier);
                if(!touch) return;

                let dir = new THREE.Vector2(touch.clientX - joystickStart.x, touch.clientY - joystickStart.y);
                const dist = dir.length();

                if (dist > maxJoystickDist) dir.normalize().multiplyScalar(maxJoystickDist);
                thumb.style.transform = `translate(${dir.x}px, ${dir.y}px)`;
                moveInput.set(dir.x / maxJoystickDist, -(dir.y / maxJoystickDist));
            }, {passive: false});

            window.addEventListener('touchend', () => {
                joystickActive = false;
                thumb.style.transform = 'translate(0px, 0px)';
                moveInput.set(0, 0);
            });

            actionBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                triggerDash();
            });

            // Keyboard support Fallback
            let keys = { w: false, a: false, s: false, d: false };
            window.addEventListener('keydown', (e) => {
                if(e.key === ' ' || e.key === 'Spacebar') triggerDash();
                if(e.key.toLowerCase() in keys) {
                    keys[e.key.toLowerCase()] = true;
                    updateKeyboardInput();
                }
            });
            window.addEventListener('keyup', (e) => {
                if(e.key.toLowerCase() in keys) {
                    keys[e.key.toLowerCase()] = false;
                    updateKeyboardInput();
                }
            });

            function updateKeyboardInput() {
                if (joystickActive) return;
                let x = 0, z = 0;
                if (keys.w) z += 1;
                if (keys.s) z -= 1;
                if (keys.a) x -= 1;
                if (keys.d) x += 1;
                moveInput.set(x, z).normalize();
            }
        }

        function findTouchById(touches, id) {
            for(let i=0; i<touches.length; i++) {
                if(touches[i].identifier === id) return touches[i];
            }
            return null;
        }

        function triggerDash() {
            if (isDashing || dashCooldown > 0 || !gameActive) return;
            isDashing = true;
            dashTimer = dashDuration;
            dashCooldown = 0.5;
            
            if(moveInput.lengthSq() > 0.05) {
                dashVelocity.set(moveInput.x, 0, -moveInput.y).normalize();
            } else {
                // If static, dash towards forward look vector orientation
                dashVelocity.set(0, 0, -1).applyAxisAngle(new THREE.Vector3(0,1,0), player.rotation.y);
            }
        }

        // --- ENEMY LIFECYCLE MECHANICS ---
        function spawnEnemy() {
            if(!gameActive || enemies.length > 12) return;

            const enemyGroup = new THREE.Group();
            const size = 0.5 + Math.random() * 0.6;
            
            // Spike Core mesh architecture
            const geo = new THREE.IcosahedronGeometry(size, 0);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff1e56, roughness: 0.3, metalness: 0.2 });
            const coreMesh = new THREE.Mesh(geo, mat);
            enemyGroup.add(coreMesh);

            // External floating energy crystal shards
            const shieldGeo = new THREE.TorusGeometry(size * 1.3, 0.05, 4, 6);
            const shieldMat = new THREE.MeshStandardMaterial({ color: 0xff7b72, emissive: 0xff1e56, wireframe: true });
            const shieldMesh = new THREE.Mesh(shieldGeo, shieldMat);
            shieldMesh.rotation.x = Math.random() * Math.PI;
            enemyGroup.add(shieldMesh);

            const angle = Math.random() * Math.PI * 2;
            const radius = 18 + Math.random() * 8;
            enemyGroup.position.set(
                player.position.x + Math.cos(angle) * radius,
                size + 0.2,
                player.position.z + Math.sin(angle) * radius
            );
            
            enemyGroup.userData = { 
                speed: 0.05 + Math.random() * 0.05, 
                radius: size * 1.3,
                shield: shieldMesh
            };
            
            scene.add(enemyGroup);
            enemies.push(enemyGroup);
        }

        function createExplosion(pos, colorHex, count = 20) {
            const geo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
            const mat = new THREE.MeshBasicMaterial({ color: colorHex });

            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(pos);
                p.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.5,
                        Math.random() * 0.4,
                        (Math.random() - 0.5) * 0.5
                    ),
                    life: 1.0
                };
                scene.add(p);
                particles.push(p);
            }
        }

        // --- ENGINE GAME TICK LOOP ---
        let lastTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = (now - lastTime) / 1000;
            lastTime = now;

            // Character Hover Animations
            if (player) {
                playerRing.rotation.z += 0.05;
                playerCore.position.y = Math.sin(now * 0.005) * 0.1;
            }

            // Map Pillar Neon Pulse Animations
            mapPillars.forEach((p, i) => {
                p.material.emissiveIntensity = 1 + Math.sin(now * 0.003 + i) * 0.5;
            });

            if (gameActive) {
                updatePlayer(delta);
                updateEnemies();
                updateParticles(delta);
                
                if(Math.random() < 0.035) spawnEnemy();
            }

            renderer.render(scene, camera);
        }

        function updatePlayer(delta) {
            if (dashCooldown > 0) dashCooldown -= delta;

            let finalVel = new THREE.Vector3();

            if (isDashing) {
                dashTimer -= delta;
                finalVel.copy(dashVelocity).multiplyScalar(baseSpeed * dashMultiplier);
                if (dashTimer <= 0) isDashing = false;
                
                // Engine stream burst trail effects
                createExplosion(player.position, 0x58a6ff, 2);
            } else {
                finalVel.set(moveInput.x, 0, -moveInput.y).multiplyScalar(baseSpeed);
            }

            player.position.add(finalVel);

            // Angular tracking matrix updates
            if (moveInput.lengthSq() > 0.01 && !isDashing) {
                const targetAngle = Math.atan2(moveInput.x, -moveInput.y);
                // Soft lerp rotation transitions
                let diff = targetAngle - player.rotation.y;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                player.rotation.y += diff * 0.25;
            } else if (isDashing) {
                player.rotation.y = Math.atan2(dashVelocity.x, dashVelocity.z);
            }

            // Map boundary locking
            player.position.x = Math.max(-arenaSize + 1.2, Math.min(arenaSize - 1.2, player.position.x));
            player.position.z = Math.max(-arenaSize + 1.2, Math.min(arenaSize - 1.2, player.position.z));

            // Camera follow view matrix matrix
            camera.position.set(player.position.x, player.position.y + 15, player.position.z + 16);
            camera.lookAt(player.position.x, player.position.y, player.position.z - 2);
        }

        function updateEnemies() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                
                // Enemy rotation loops
                enemy.rotation.x += 0.02;
                enemy.userData.shield.rotation.z -= 0.04;

                const dir = new THREE.Vector3().subVectors(player.position, enemy.position);
                dir.y = 0;
                dir.normalize();
                enemy.position.add(dir.multiplyScalar(enemy.userData.speed));

                // Collision algorithm limits
                const dist = player.position.distanceTo(enemy.position);
                const collisionThreshold = 0.8 + enemy.userData.radius;

                if (dist < collisionThreshold) {
                    scene.remove(enemy);
                    enemies.splice(i, 1);

                    if (isDashing) {
                        createExplosion(enemy.position, 0xff1e56, 25);
                        score += 150;
                        document.getElementById('score-val').innerText = score;
                    } else {
                        createExplosion(player.position, 0xff7b72, 30);
                        hp -= 25;
                        document.getElementById('hp-val').innerText = Math.max(0, hp) + "%";
                        
                        if (hp <= 0) triggerGameOver();
                    }
                }
            }
        }

        function updateParticles(delta) {
            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.userData.velocity);
                p.userData.life -= delta * 1.8;
                p.scale.multiplyScalar(0.95);

                if(p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }
        }

        function triggerGameOver() {
            gameActive = false;
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        function resetGame() {
            enemies.forEach(e => scene.remove(e));
            particles.forEach(p => scene.remove(p));
            enemies = [];
            particles = [];
            
            hp = 100;
            score = 0;
            isDashing = false;
            document.getElementById('hp-val').innerText = "100%";
            document.getElementById('score-val').innerText = "0";
            document.getElementById('game-over-screen').style.display = 'none';
            
            player.position.set(0, 1.2, 0);
            gameActive = true;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
