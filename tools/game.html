<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mr. Kim's Mega-Growth Arena</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #0a0e17;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
        }
        .hud-element {
            background: rgba(13, 17, 23, 0.85);
            border: 2px solid #ffaa00;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.3);
            padding: 12px 25px;
            border-radius: 20px;
            color: #ffffff;
            backdrop-filter: blur(6px);
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        #top-hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        #stat-growth { color: #ffaa00; text-shadow: 0 0 8px #ffaa00; }
        #stat-count { color: #00ffcc; text-shadow: 0 0 8px #00ffcc; }
        
        /* iPad Mobile Virtual Joystick */
        #controls-layer {
            display: flex;
            justify-content: flex-start;
            align-items: flex-end;
            width: 100%;
            padding-bottom: 15px;
        }
        .touch-zone { pointer-events: auto; }
        #joystick-bound {
            width: 130px;
            height: 130px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 170, 0, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.1);
        }
        #joystick-thumb {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #ffaa00 0%, #ff5500 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px #ffaa00;
        }
        #instructions {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 0.9rem;
        }
        #error-log {
            position: absolute;
            top: 90px;
            left: 20px;
            background: rgba(255, 0, 0, 0.85);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.8rem;
            max-width: 90%;
            display: none;
            z-index: 200;
            pointer-events: auto;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="error-log"></div>

    <div id="ui-layer">
        <div id="top-hud">
            <div class="hud-element">MR. KIM SIZE: <span id="stat-growth">1.0x</span></div>
            <div class="hud-element">DEVOURED: <span id="stat-count">0</span></div>
        </div>

        <div id="controls-layer">
            <div id="joystick-bound" class="touch-zone">
                <div id="joystick-thumb"></div>
            </div>
        </div>
        <div id="instructions">RUN INTO SMALLER DUMMIES TO ABSORB THEM</div>
    </div>

    <script>
        let scene, camera, renderer, clock;
        let player, playerMesh;
        let targets = [];
        let particles = [];
        
        let devouredCount = 0;
        let playerScaleModifier = 4.0; // Perfect base layout scale
        let cameraZoomFactor = 1.0;
        
        const moveInput = new THREE.Vector2(0, 0);
        const mapSize = 45;
        const playerSpeedBase = 15.0;

        let joystickActive = false;
        let joystickStart = new THREE.Vector2();
        const maxJoystickDist = 50;

        function init() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0e17);
            scene.fog = new THREE.FogExp2(0x0a0e17, 0.015);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            updateCameraPosition();

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffaa00, 0.8);
            sunLight.position.set(20, 40, 20);
            scene.add(sunLight);

            const rimLight = new THREE.DirectionalLight(0x00ffff, 0.4);
            rimLight.position.set(-20, 20, -20);
            scene.add(rimLight);

            buildPlaygroundMap();
            buildPlayerCharacter();
            setupJoystickControls();
            
            for(let i=0; i<15; i++) spawnTargetItem();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function buildPlaygroundMap() {
            const floorGeo = new THREE.PlaneGeometry(mapSize * 2, mapSize * 2);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x121824, roughness: 0.6 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const gridLines = new THREE.GridHelper(mapSize * 2, mapSize, 0xffaa00, 0x1f293d);
            gridLines.position.y = 0.01;
            scene.add(gridLines);

            const fenceGeo = new THREE.BoxGeometry(mapSize * 2, 1, 1);
            const fenceMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x552200 });
            
            const n = new THREE.Mesh(fenceGeo, fenceMat); n.position.set(0, 0.5, -mapSize); scene.add(n);
            const s = new THREE.Mesh(fenceGeo, fenceMat); s.position.set(0, 0.5, mapSize); scene.add(s);
            const e = new THREE.Mesh(fenceGeo, fenceMat); e.rotation.y = Math.PI/2; e.position.set(mapSize, 0.5, 0); scene.add(e);
            const w = new THREE.Mesh(fenceGeo, fenceMat); w.rotation.y = Math.PI/2; w.position.set(-mapSize, 0.5, 0); scene.add(w);
        }

        function buildPlayerCharacter() {
            player = new THREE.Group();
            player.position.set(0, 0, 0);
            scene.add(player);

            const loader = new THREE.GLTFLoader();
            loader.load('./Meshy_AI_Cloudy_Sky_Portrait_0610185922_texture.glb', function(gltf) {
                playerMesh = gltf.scene;
                
                playerMesh.scale.set(playerScaleModifier, playerScaleModifier, playerScaleModifier); 
                
                // FIXED VALUE: Brought up to 2.2 units so feet touch ground surface perfectly
                playerMesh.position.set(0, 0.55 * playerScaleModifier, 0); 
                playerMesh.rotation.y = Math.PI; 
                player.add(playerMesh);
            }, undefined, function(error) {
                const logBox = document.getElementById('error-log');
                logBox.style.display = 'block';
                logBox.innerText = "Check file location for your custom portrait model.";
                console.error(error);
            });
        }

        function setupJoystickControls() {
            const bound = document.getElementById('joystick-bound');
            const thumb = document.getElementById('joystick-thumb');

            bound.addEventListener('touchstart', (e) => {
                joystickActive = true;
                const rect = bound.getBoundingClientRect();
                joystickStart.set(rect.left + rect.width/2, rect.top + rect.height/2);
            }, {passive: true});

            window.addEventListener('touchmove', (e) => {
                if (!joystickActive) return;
                const touch = e.touches[0];
                let dir = new THREE.Vector2(touch.clientX - joystickStart.x, touch.clientY - joystickStart.y);
                const dist = dir.length();

                if (dist > maxJoystickDist) dir.normalize().multiplyScalar(maxJoystickDist);
                thumb.style.transform = `translate(${dir.x}px, ${dir.y}px)`;
                moveInput.set(dir.x / maxJoystickDist, -(dir.y / maxJoystickDist));
            }, {passive: false});

            window.addEventListener('touchend', () => {
                joystickActive = false;
                thumb.style.transform = 'translate(0px, 0px)';
                moveInput.set(0, 0);
            });

            let keys = { w: false, a: false, s: false, d: false };
            window.addEventListener('keydown', (e) => {
                if(e.key.toLowerCase() in keys) { keys[e.key.toLowerCase()] = true; updateKeyInput(); }
            });
            window.addEventListener('keyup', (e) => {
                if(e.key.toLowerCase() in keys) { keys[e.key.toLowerCase()] = false; updateKeyInput(); }
            });
            function updateKeyInput() {
                if(joystickActive) return;
                let x = 0, z = 0;
                if(keys.w) z += 1; if(keys.s) z -= 1;
                if(keys.a) x -= 1; if(keys.d) x += 1;
                moveInput.set(x, z).normalize();
            }
        }

        function spawnTargetItem() {
            const targetGroup = new THREE.Group();
            const scaleFactor = 0.4 + Math.random() * 1.5;

            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.4, 0.4, 1.4, 8),
                new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, roughness: 0.4 })
            );
            body.position.y = 0.7;
            targetGroup.add(body);

            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            head.position.y = 1.5;
            targetGroup.add(head);

            targetGroup.scale.set(scaleFactor, scaleFactor, scaleFactor);

            targetGroup.position.set(
                (Math.random() - 0.5) * (mapSize * 1.7),
                0,
                (Math.random() - 0.5) * (mapSize * 1.7)
            );

            targetGroup.userData = { 
                radius: scaleFactor * 0.8,
                bounceSeed: Math.random() * 10,
                fleeing: false
            };

            scene.add(targetGroup);
            targets.push(targetGroup);
        }

        function createAbsorbParticles(pos, colorHex, scaleVal) {
            const geo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            const mat = new THREE.MeshBasicMaterial({ color: colorHex });
            const count = Math.floor(15 * scaleVal);
            
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(pos);
                p.position.y += scaleVal;
                p.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * (8 * scaleVal),
                        Math.random() * (10 * scaleVal),
                        (Math.random() - 0.5) * (8 * scaleVal)
                    ),
                    life: 0.7
                };
                scene.add(p);
                particles.push(p);
            }
        }

        function handlePlayerGrowth(targetRadius) {
            devouredCount++;
            
            const growthIncrement = targetRadius * 0.25;
            playerScaleModifier += growthIncrement;
            cameraZoomFactor += growthIncrement * 0.12;

            if (playerMesh) {
                playerMesh.scale.set(playerScaleModifier, playerScaleModifier, playerScaleModifier);
                
                // FIXED RATIO ENGINE: Maintains leg position on top of floor throughout full growth cycle
                playerMesh.position.y = 0.55 * playerScaleModifier;
            }

            document.getElementById('stat-growth').innerText = (playerScaleModifier / 4.0).toFixed(1) + "x";
            document.getElementById('stat-count').innerText = devouredCount;
        }

        function updateCameraPosition() {
            camera.position.set(
                player ? player.position.x : 0, 
                (player ? player.position.y : 0) + (14 * cameraZoomFactor), 
                (player ? player.position.z : 0) + (18 * cameraZoomFactor)
            );
            if(player) camera.lookAt(player.position.x, player.position.y + (1.5 * cameraZoomFactor), player.position.z);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (player) {
                const speedModifier = playerSpeedBase * (1 + (cameraZoomFactor - 1) * 0.4); 
                const moveVec = new THREE.Vector3(moveInput.x, 0, -moveInput.y).multiplyScalar(speedModifier * delta);
                player.position.add(moveVec);

                if (moveInput.lengthSq() > 0.01) {
                    player.rotation.y = Math.atan2(moveInput.x, -moveInput.y);
                }

                player.position.x = Math.max(-mapSize + 2, Math.min(mapSize - 2, player.position.x));
                player.position.z = Math.max(-mapSize + 2, Math.min(mapSize - 2, player.position.z));

                updateCameraPosition();
            }

            const time = performance.now() * 0.004;
            const currentPlayerRadius = (playerScaleModifier / 4.0) * 1.5;

            for(let i = targets.length - 1; i >= 0; i--) {
                const target = targets[i];
                
                target.position.y = Math.abs(Math.sin(time + target.userData.bounceSeed)) * 0.5 * target.scale.y;

                const distance = player.position.distanceTo(target.position);
                const combinedRadius = currentPlayerRadius + target.userData.radius;

                if (distance < combinedRadius * 3.5) {
                    const fleeDir = new THREE.Vector3().subVectors(target.position, player.position).normalize();
                    target.position.add(fleeDir.multiplyScalar(6.0 * delta * target.scale.x));
                    target.rotation.y = Math.atan2(fleeDir.x, fleeDir.z);
                    
                    target.position.x = Math.max(-mapSize+2, Math.min(mapSize-2, target.position.x));
                    target.position.z = Math.max(-mapSize+2, Math.min(mapSize-2, target.position.z));
                }

                if (distance < combinedRadius) {
                    createAbsorbParticles(target.position, 0xffaa00, target.scale.y);
                    handlePlayerGrowth(target.userData.radius);
                    
                    scene.remove(target);
                    targets.splice(i, 1);
                    
                    spawnTargetItem();
                }
            }

            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.userData.velocity.clone().multiplyScalar(delta));
                p.userData.velocity.y -= delta * 22.0; 
                p.userData.life -= delta;
                p.scale.multiplyScalar(0.96);

                if(p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
