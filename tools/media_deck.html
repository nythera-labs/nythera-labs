<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zaeem Labs // Media Deck Suite</title>
    <link type="image/png" rel="icon" href="../logo.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: ui-monospace, Consolas, Monaco, monospace;
        }
        body {
            background-color: #030308;
            color: #ffffff;
            min-height: 100vh;
            padding: 30px 15px;
            overflow-x: hidden;
        }
        .grid-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 0, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.015) 1px, transparent 1px);
            background-size: 30px 35px;
            z-index: 1;
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 2;
            max-width: 950px;
            margin: 0 auto;
        }
        .back-btn {
            color: #728196;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 25px;
            transition: color 0.2s ease;
        }
        .back-btn:hover { color: #ff00ff; }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px dashed rgba(255, 0, 255, 0.2);
            padding-bottom: 25px;
        }
        h1 {
            font-size: 2.3rem;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
            margin-bottom: 8px;
        }
        .subtitle {
            color: #00ffcc;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: rgba(10, 11, 25, 0.6);
            border: 1px solid rgba(255, 0, 255, 0.15);
            color: #728196;
            font-weight: 900;
            cursor: pointer;
            border-radius: 12px;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: rgba(255, 0, 255, 0.08);
            border-color: #ff00ff;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.15);
        }

        .panel-card {
            background: rgba(8, 9, 20, 0.85);
            border: 1px solid rgba(255, 0, 255, 0.15);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
        }
        .panel-card.active { display: block; }

        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            color: #00ffcc;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 16px;
            background: #020205;
            border: 1px solid rgba(255, 0, 255, 0.2);
            border-radius: 10px;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .action-btn {
            padding: 16px 30px;
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid #ff00ff;
            color: #ff00ff;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        .action-btn:hover {
            background: #ff00ff;
            color: #000000;
            box-shadow: 0 0 15px #ff00ff;
        }

        #search-results-tray {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
            max-height: 260px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 10px;
            background: rgba(2, 2, 5, 0.95);
            border: 1px solid rgba(0, 255, 204, 0.3);
            display: none;
        }
        .search-node-card {
            background: #0a0b19;
            border: 1px solid rgba(255, 0, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .search-node-card:hover {
            border-color: #00ffcc;
            background: rgba(0, 255, 204, 0.08);
        }
        .search-node-thumb {
            width: 40px;
            height: 55px;
            object-fit: cover;
            background: #111;
            border-radius: 4px;
        }
        .search-node-meta h4 {
            font-size: 0.85rem;
            color: #ffffff;
            margin-bottom: 3px;
        }
        .search-node-meta p {
            font-size: 0.75rem;
            color: #728196;
        }

        .video-box {
            margin-top: 25px;
            display: none;
            border: 2px solid #00ffcc;
            border-radius: 14px;
            overflow: hidden;
            background: #000000;
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.15);
        }
        .video-box iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .preview-box {
            margin-top: 25px;
            background: #020205;
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 12px;
            padding: 20px;
            display: none;
        }
        .preview-flex {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .preview-thumb {
            width: 150px;
            height: 90px;
            background: #111222;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .preview-info h3 {
            font-size: 1.1rem;
            color: #ffffff;
            margin-bottom: 5px;
        }
        .preview-info p {
            font-size: 0.8rem;
            color: #556275;
            margin-bottom: 12px;
        }
        .dl-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .dl-node {
            padding: 16px;
            background: rgba(0, 255, 204, 0.04);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            text-align: center;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 900;
            border-radius: 10px;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        .dl-node:hover {
            background: #00ffcc;
            color: #020205;
            box-shadow: 0 0 15px #00ffcc;
        }
        .dl-node.open-source {
            border-color: #ff00ff;
            color: #ff00ff;
            background: rgba(255, 0, 255, 0.04);
        }
        .dl-node.open-source:hover {
            background: #ff00ff;
            color: #020205;
            box-shadow: 0 0 15px #ff00ff;
        }
    </style>
</head>
<body>

    <div class="grid-backdrop"></div>

    <div class="container">
        
        <a href="../index.html" class="back-btn">⚡ RETURN TO MAIN PORTAL</a>

        <header>
            <h1>MEDIA DECK</h1>
            <div class="subtitle">Zaeem Labs // Stream & Download Controller</div>
        </header>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchPanel('imdb-panel', this)">IMDb MOVIE MATRIX</button>
            <button class="tab-btn" onclick="switchPanel('dl-panel', this)">SOCIAL SCRAPER SUITE</button>
        </div>

        <div id="imdb-panel" class="panel-card active">
            
            <div class="input-group" style="margin-bottom: 30px; border-bottom: 1px dashed rgba(0, 255, 204, 0.15); padding-bottom: 25px;">
                <label>Built-In Title Search Engine</label>
                <div class="input-row">
                    <input type="text" id="deck-search-bar" placeholder="Type movie or show name to search instantly..." oninput="triggerLiveDeckSearch()">
                </div>
                <div id="search-results-tray"></div>
            </div>

            <div class="input-group">
                <label>Target Entry ID / Source Registry</label>
                <div class="input-row">
                    <input type="text" id="imdb-input" placeholder="Or paste direct IMDb URL/ID (e.g. tt1375666)">
                    <button class="action-btn" onclick="injectImdbStream()">PLAY STREAM</button>
                </div>
            </div>

            <div id="imdb-video-box" class="video-box">
                <iframe id="imdb-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </div>

        <div id="dl-panel" class="panel-card">
            <div class="input-group">
                <label>Media Source Link parameters</label>
                <div class="input-row">
                    <input type="text" id="dl-input" placeholder="Paste YouTube, Instagram, or Facebook URL">
                    <button class="action-btn" onclick="processSocialLink()">EXTRACT PARAMETERS</button>
                </div>
            </div>

            <div id="local-stream-box" class="video-box" style="margin-bottom: 25px; border-color: #ff00ff; box-shadow: 0 0 30px rgba(255, 0, 255, 0.15);">
                <iframe id="local-stream-frame" src="" allowfullscreen></iframe>
            </div>

            <div id="dl-preview-box" class="preview-box">
                <div class="preview-flex">
                    <div id="meta-icon" class="preview-thumb">⚡</div>
                    <div class="preview-info">
                        <h3 id="meta-title">Extracted Media Core Stream</h3>
                        <p id="meta-source">Source: Parsing Verified</p>
                        <div style="color: #00ffcc; font-size: 0.75rem; font-weight: 900;">STATUS: TRAUMA-FREE MATRIX ENGAGED</div>
                    </div>
                </div>
                
                <label style="margin-top: 20px;">Available Safe Lab Extraction Routes</label>
                <div class="dl-grid" id="download-nodes-grid"></div>
            </div>
        </div>

    </div>

    <script>
        let searchDebounceTimeout = null;

        function switchPanel(panelId, btnElement) {
            document.querySelectorAll('.panel-card').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            btnElement.classList.add('active');
        }

        function triggerLiveDeckSearch() {
            clearTimeout(searchDebounceTimeout);
            let query = document.getElementById('deck-search-bar').value.trim();
            let tray = document.getElementById('search-results-tray');

            if (query.length < 2) {
                tray.style.display = 'none';
                return;
            }

            searchDebounceTimeout = setTimeout(() => {
                let sanitizedQuery = query.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
                let targetLetter = sanitizedQuery[0];
                
                let oldScript = document.getElementById('imdb-jsonp-bridge');
                if (oldScript) oldScript.remove();

                let cbName = `imdb$${sanitizedQuery}`;
                window[cbName] = function(data) {
                    populateResultsTray(data);
                    try { delete window[cbName]; } catch(e) {}
                };

                let script = document.createElement('script');
                script.id = 'imdb-jsonp-bridge';
                script.src = `https://sg.media-imdb.com/suggests/${targetLetter}/${encodeURIComponent(sanitizedQuery)}.json`;
                document.body.appendChild(script);
            }, 300);
        }

        function populateResultsTray(data) {
            let tray = document.getElementById('search-results-tray');
            tray.innerHTML = '';

            if (!data || !data.d || data.d.length === 0) {
                tray.style.display = 'none';
                return;
            }

            data.d.forEach(node => {
                if (!node.id.startsWith('tt') || !['feature', 'tv_series', 'tv_miniseries', 'movie'].includes(node.q)) return;

                let card = document.createElement('div');
                card.className = 'search-node-card';
                
                let thumbSrc = (node.i && node.i[0]) ? node.i[0] : 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=120&auto=format&fit=crop';
                let releaseYear = node.y ? node.y : 'N/A';
                let contentTypeLabel = (node.q.startsWith('tv')) ? '🎬 TV SHOW' : '🎥 MOVIE';

                card.innerHTML = `
                    <img class="search-node-thumb" src="${thumbSrc}">
                    <div class="search-node-meta">
                        <h4>${node.l}</h4>
                        <p>${releaseYear} • ${contentTypeLabel}</p>
                    </div>
                `;

                card.onclick = function() {
                    document.getElementById('imdb-input').value = node.id;
                    tray.style.display = 'none';
                    injectImdbStream();
                };

                tray.appendChild(card);
            });

            tray.style.display = (tray.children.length > 0) ? 'grid' : 'none';
        }

        function injectImdbStream() {
            let inputVal = document.getElementById('imdb-input').value.trim();
            let idMatch = inputVal.match(/tt\d+/);
            let imdbId = idMatch ? idMatch[0] : inputVal;

            if (!imdbId || !imdbId.startsWith('tt')) {
                alert("ERROR: Please use the title search bar above or paste an ID starting with tt.");
                return;
            }

            let playImdbUrl = `https://www.playimdb.com/title/${imdbId}/`;
            let frame = document.getElementById('imdb-frame');
            let box = document.getElementById('imdb-video-box');
            
            frame.src = playImdbUrl;
            box.style.display = 'block';
            box.scrollIntoView({ behavior: 'smooth' });
        }

        // Helper regex matching script to strip YouTube Video Identification strings cleanly
        function extractYouTubeVideoId(url) {
            let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            let match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // --- BULLETPROOF MULTI-ROUTE UTILITY PARSER ---
        function processSocialLink() {
            let url = document.getElementById('dl-input').value.trim();
            if (!url) return alert("ERROR: Input address field cannot settle empty entries.");

            let title = "Media Resource Element";
            let platformIcon = "⚡";
            
            let ytId = extractYouTubeVideoId(url);
            let localPlayerBox = document.getElementById('local-stream-box');
            let localPlayerFrame = document.getElementById('local-stream-frame');
            let grid = document.getElementById('download-nodes-grid');

            if (ytId) {
                title = "YouTube Sandbox Mainframe";
                platformIcon = "🎥";

                // INJECTS AN AD-FREE PLAYER DIRECTLY INSIDE YOUR LAB SITE CONTAINER
                localPlayerFrame.src = `https://yewtu.be/embed/${ytId}?quality=dash`;
                localPlayerBox.style.display = 'block';

                // Safe open-source mirror terminal connection link (100% ad-free file save interface)
                let ultraSafeSaveNode = `https://yewtu.be/watch?v=${ytId}`;

                grid.innerHTML = `
                    <a href="${ultraSafeSaveNode}" target="_blank" class="dl-node open-source">⬇️ OPEN CLEAN DOWNLOAD NODE</a>
                    <a href="${url}" target="_blank" class="dl-node">📺 ORIGINAL YOUTUBE LINK</a>
                `;
            } else {
                // If it's Instagram or Facebook, clean-wipe the local iframe box and deploy Cobalt structures
                localPlayerFrame.src = "";
                localPlayerBox.style.display = 'none';

                if (url.includes('instagram.com')) {
                    title = "Instagram Media Profile Reel";
                    platformIcon = "📸";
                } else if (url.includes('facebook.com') || url.includes('fb.watch')) {
                    title = "Facebook Video Payload Package";
                    platformIcon = "🌐";
                }

                let adFreeCobaltLink = `https://cobalt.tools/#${encodeURIComponent(url)}`;

                grid.innerHTML = `
                    <a href="${adFreeCobaltLink}" target="_blank" class="dl-node open-source">🚀 DOWNLOAD (AD-FREE COBALT)</a>
                    <a href="${url}" target="_blank" class="dl-node">📺 ORIGINAL SOURCE LINK</a>
                `;
            }

            document.getElementById('meta-title').innerText = title;
            document.getElementById('meta-icon').innerText = platformIcon;
            document.getElementById('meta-source').innerText = `Verified: ${url.substring(0, 45)}...`;
            document.getElementById('dl-preview-box').style.display = 'block';
        }
    </script>
</body>
</html>
